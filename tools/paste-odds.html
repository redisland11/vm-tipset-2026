<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Manuell odds-uppdatering — VM-tipset 2026</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .paste-tool { max-width: 900px; margin: 24px auto; padding: 20px; }
    .paste-tool textarea { width: 100%; min-height: 200px; font-family: monospace; padding: 10px; border: 1px solid var(--border-strong); border-radius: 6px; }
    .paste-tool .actions { display: flex; gap: 12px; align-items: center; margin: 12px 0; }
    .paste-tool .status { padding: 10px; border-radius: 6px; margin: 12px 0; }
    .paste-tool .status.ok { background: var(--success-soft); color: var(--success); }
    .paste-tool .status.err { background: var(--error-soft); color: var(--error); }
    .paste-tool .preview { font-size: 13px; border-collapse: collapse; width: 100%; margin-top: 12px; }
    .paste-tool .preview th, .paste-tool .preview td { padding: 6px 10px; border-bottom: 1px solid var(--border); text-align: left; }
    .paste-tool .preview tr.miss { background: var(--error-soft); }
    .paste-tool button { padding: 10px 18px; font-size: 14px; }
    .paste-tool input[type=password] { padding: 8px 10px; border: 1px solid var(--border-strong); border-radius: 6px; font-family: inherit; }
  </style>
</head>
<body>
  <main class="paste-tool">
    <h1>Manuell odds-uppdatering</h1>
    <p>
      1. Öppna <a href="https://www.expekt.se/sports#/league/1820/events" target="_blank" rel="noopener">Expekt VM 2026</a><br>
      2. Markera matcher + odds → kopiera (Ctrl+C)<br>
      3. Klistra in nedan
    </p>

    <textarea id="input" placeholder="Klistra in text från Expekt här..."></textarea>

    <div class="actions">
      <button id="processBtn" type="button">Bearbeta</button>
      <span id="parseStatus"></span>
    </div>

    <div id="preview"></div>

    <div class="actions" id="syncRow" style="display: none;">
      <label>ODDS_UPDATE_SECRET: <input type="password" id="secret" autocomplete="current-password"></label>
      <button id="syncBtn" type="button">Ladda ner odds.csv + synka Sheet:en</button>
    </div>

    <div id="syncStatus"></div>
  </main>

  <script src="../js/config.js"></script>
  <script src="../js/matches.js"></script>
  <script src="team-map.js"></script>
  <script src="paste-odds.js"></script>
</body>
</html>
