<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Topplista — VM-tävling i stugan 2026</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <h1>VM-tävling i stugan 2026</h1>
      <nav class="nav-links">
        <a href="index.html">Tipsa</a>
        <a href="topplistan.html" class="active">Topplista</a>
      </nav>
      <div class="counter"><span id="lastUpdated">—</span></div>
    </div>
  </header>

  <main class="container container--wide">
    <section class="lb-card">
      <div class="lb-card-header">
        <div>
          <h2>Topplista</h2>
          <p class="lb-subtitle">Mer info om tävlingen och priserna hittar du <a href="https://gamblingcabin.se/vm-tipset-2026/" target="_blank" rel="noopener">här</a>.</p>
        </div>
        <div class="lb-card-actions">
          <div class="lb-legend">
            <span class="lb-legend-item"><span class="legend-bar b1"></span> 1 (hemma)</span>
            <span class="lb-legend-item"><span class="legend-bar bx"></span> X</span>
            <span class="lb-legend-item"><span class="legend-bar b2"></span> 2 (borta)</span>
          </div>
          <input id="lbSearch" class="lb-search" type="search" placeholder="Sök namn eller lag…" autocomplete="off">
          <button id="refreshBtn" class="refresh-btn" type="button">↻ Uppdatera</button>
        </div>
      </div>

      <div id="leaderboardStatus" class="leaderboard-status hidden"></div>

      <div id="lbLoading" class="lb-loading">
        <span class="lb-spinner" aria-hidden="true"></span>
        <span>Hämtar topplistan…</span>
      </div>

      <div class="lb-table-wrapper" id="lbWrapper">
        <table class="lb-table" id="lbTable">
          <thead id="lbThead"></thead>
          <tbody id="lbTbody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/topplistan.js"></script>
</body>
</html>
